<!-- brand.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion.net - Brands</title>
    <!-- CHANGED: /static/styles.css → ./styles.css -->
    <link rel="stylesheet" href="./styles.css">
    <!-- CHANGED: /static/scripts.js → ./scripts.js -->
    <script src="./scripts.js" defer></script>
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; }
        header { background-color: #000; color: #fff; padding: 15px; text-align: left; position: relative; }
        main { flex: 1; margin-left: 20px; padding: 20px; }
        footer { background-color: #333; color: #fff; text-align: center; padding: 70px 0; }

        .sidebar {
            position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
            background-color: #fff; box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
            padding: 20px; transition: left 0.3s ease-in-out; z-index: 1000; overflow-y: auto;
        }
        .sidebar.open { left: 0; }
        .sidebar h3 { font-size: 1.5em; margin-bottom: 20px; color: #333; }
        .close-sidebar { position: relative; top: 10px; right: 10px; background: none; border: none; font-size: 1.5em; cursor: pointer; }

        .filter-section { margin-bottom: 20px; }
        .filter-section label { display: block; font-size: 1em; font-weight: bold; margin-bottom: 5px; color: #333; }
        .filter-section select, .filter-section input { width: 100%; margin-bottom: 10px; padding: 5px; border: 1px solid #ccc; border-radius: 5px; }

        .sidebar-buttons button { width: 100%; padding: 10px; margin-bottom: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; }
        .view-results { background-color: #28a745; color: white; }
        .clear-all { background-color: #dc3545; color: white; }

        .filter-toggle { position: fixed; left: 20px; top: 15px; background-color: #fff; color: #000; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }

        .product-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .cart-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 20px; }

        .product-card {
            text-align: center; padding: 20px; border: 1px solid #ddd;
            border-radius: 8px; width: 80%; max-width: 250px;
            background-color: #f9f9f9; transition: transform 0.3s ease;
        }
        .product-card:hover { transform: scale(1.05); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); }
        .product-card img { width: 100%; max-width: 200px; height: auto; border-radius: 8px; object-fit: cover; margin-bottom: 15px; }
        .product-card h4 { font-size: 1.2em; margin-bottom: 10px; color: #333; }
        .product-card p { font-size: 0.9em; line-height: 1.5; color: #555; margin: 10px 0; }
        .product-card .price { color: #681203; font-size: 1.1em; font-weight: bold; margin: 10px 0; }

        #budget-value { font-weight: bold; color: #681203; font-size: 1em; }

        .brand-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 20px; }
        .brand-item { text-align: center; cursor: pointer; }
        .brand-item img { width: 100px; height: auto; display: block; margin: 0 auto; }

        .category-grid { display: none; margin-top: 20px; }
        .subcategory-link { display: inline-block; margin: 0 10px; text-decoration: underline; cursor: pointer; color: #007bff; }

        .cart-item {
            text-align: center; padding: 20px; border: 1px solid #ddd;
            border-radius: 8px; width: 80%; max-width: 250px; background-color: #f9f9f9;
        }
        .cart-button { background-color: #28a745; color: white; padding: 10px; border: none; cursor: pointer; margin-top: 10px; font-size: 0.9em; border-radius: 5px; }
        .remove-button { background-color: #dc3545; color: white; padding: 5px; border: none; cursor: pointer; margin-top: 10px; font-size: 0.8em; border-radius: 5px; }

        .result-item { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; background-color: #f9f9f9; }
        .result-item h4 { margin: 0; font-size: 1.2em; color: #333; }
        .result-item p { margin: 5px 0; font-size: 1em; color: #555; }
    </style>
</head>

<body>
    <header>
        <button class="filter-toggle" onclick="toggleSidebar()">☰ Filters</button>
        <h1>Welcome to Fashion.net</h1>
    </header>

    <!-- FIXED: removed duplicate <div id="results"> that appeared before the sidebar -->

    <div class="sidebar" id="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">✖</button>
        <h3>Filters</h3>
        <div class="filter-section">
            <label for="size">Size:</label>
            <select id="size">
                <option value="">Select Size</option>
                <option value="XS">XS</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
            </select>
        </div>
        <div class="filter-section">
            <label for="budget">Budget (PKR):</label>
            <!-- FIXED: oninput uses correct JS template literal syntax -->
            <input type="range" id="budget" name="budget" min="100" max="25000" value="5000" oninput="updateBudgetValue(this.value)">
            <span id="budget-value">PKR 5000</span>
        </div>
        <div class="filter-section">
            <label for="category">Category:</label>
            <select id="category">
                <option value="">Select Category</option>
                <option value="clothing">Clothing</option>
                <option value="footwear">Footwear</option>
                <option value="accessories">Accessories</option>
                <option value="cosmetics">Cosmetics</option>
            </select>
        </div>
        <div class="filter-section">
            <label for="occasion">Occasion:</label>
            <select id="occasion">
                <option value="">Select Occasion</option>
                <option value="casual">Casual</option>
                <option value="semi-formal">Semi-formal</option>
                <option value="formal">Formal</option>
                <option value="wedding">Wedding</option>
            </select>
        </div>
        <div class="sidebar-buttons">
            <button class="view-results" onclick="applyFilters()">View Results</button>
            <button class="clear-all" onclick="clearFilters()">Clear All</button>
        </div>
    </div>

    <main>
        <h2>Brands</h2>
        <div class="brand-grid">
            <div class="brand-item" onclick="showCategories('ETHNIC')">
                <img src="https://www.revieyou.com/wp-content/uploads/2020/03/15822574_1322815824448082_6368198250104913669_n.png" alt="Ethnic">
                <button>ETHNIC</button>
            </div>
            <div class="brand-item" onclick="showCategories('ZELLBURY')">
                <img src="https://www.hdcollection.com.pk/cdn/shop/collections/ZELLBURY_LOGO.jpg?v=1661787351" alt="Zellbury">
                <button>ZELLBURY</button>
            </div>
            <div class="brand-item" onclick="showCategories('SAPPHIRE')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRtaZsnpwVyl4BJ4EV36cJHTaYzG6tCRPY_7A&s" alt="Sapphire">
                <button>SAPPHIRE</button>
            </div>
            <div class="brand-item" onclick="showCategories('OUTFITTERS')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSimi8twCTodEQs88YpzRQaDx__CIfABhSX7Q&s" alt="Outfitters">
                <button>OUTFITTERS</button>
            </div>
            <div class="brand-item" onclick="showCategories('SAYA')">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSoiKgf83RBwT-qz_O2LlcksGv_RGcxnst_Og&s" alt="Saya">
                <button>SAYA</button>
            </div>
        </div>

        <div class="category-grid" id="categories">
            <h2 id="brand-name"></h2>
            <div id="subcategories"></div>
            <div class="product-grid" id="product-grid"></div>
        </div>

        <div class="cart-container" id="cart">
            <h2>Shopping Cart</h2>
            <div id="cart-items"></div>
            <!-- CHANGED: url_for('checkout') → checkout.html -->
            <button class="cart-button" onclick="checkout()">Proceed to Checkout</button>
            <p id="cart-total" style="font-weight: bold;"></p>
            <p id="checkout-message" style="color: green;"></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Fashion.net. All Rights Reserved.</p>
    </footer>

    <script>

                    { name: "Embroided suit", image: "https://cdn-live.sanaullastore.com/products/product_images/zellbury-unstitched-luxury-collection-2023-d-30355-_1_.jpg%3Fwidth%3D640", description: "Embroidered lawn suit with modern elegance, perfect for warm weather.", price: "PKR 5000", sizes: ['S', 'M', 'L'] },

                    { name: "Unstiched", image: "https://faisalfabrics.pk/cdn/shop/files/WUS24E31247-3.jpg?v=1720110071", description: "Premium lawn fabric with shirt, trousers and chiffon dupatta.", price: "PKR 3500", sizes: ['XS', 'M', 'L', 'XL'] }
                ],
                Bags: [
                    { name: "Tote bag", image: "https://zellbury.com/cdn/shop/files/WBT22E299-BLACK-LS-2.jpg?v=1718005942", description: "High-quality material with a sleek, minimalist design for all your essentials.", price: "PKR 2000", sizes: [] },
                    { name: "Cross-body bag", image: "https://zellbury.com/cdn/shop/files/WBC22E288-GREEN-1.jpg?v=1718011580", description: "Sleek compact design with adjustable straps and a secure closure.", price: "PKR 2200", sizes: [] },
                    { name: "Canvas bag", image: "https://zellbury.com/cdn/shop/files/WBT22E374_1.jpg?v=1724499885&width=1445", description: "Spacious interior and sturdy straps for easy carrying, perfect for everyday use.", price: "PKR 2600", sizes: [] }
                ]
            },
            SAPPHIRE: {
                LuxuryPret: [
                    { name: "Luxe-Formal wear", image: "https://faisalfabrics.pk/cdn/shop/products/PLM07625_02883aef-2889-4d6d-a1af-f8f54771c96d.jpg?v=1708554737", description: "Elegant luxury wear with premium fabrics and intricate detailing for special occasions.", price: "PKR 15000", sizes: ['S', 'M', 'L', 'XL'] },
                    { name: "Coat Style", image: "https://www.nameerabyfarooq.com/cdn/shop/files/BuyCrystalWhiteEmbroideredPakistaniWeddingDressinJacketStyle_620x.jpg?v=1696000843", description: "A chic coat dress with a sleek silhouette and tailored lapels.", price: "PKR 25000", sizes: ['M', 'L', 'XL'] },
                    { name: "Saree", image: "https://static.wixstatic.com/media/4594f8_c69ecd10fa4a480fb87719cefa5aeb58~mv2.jpg/v1/fill/w_480,h_640,al_c,q_80,usm_0.66_1.00_0.01,enc_auto/4594f8_c69ecd10fa4a480fb87719cefa5aeb58~mv2.jpg", description: "A classic saree with elegant draping and intricate details.", price: "PKR 11000", sizes: ['M', 'L', 'XL'] }
                ],

                    { name: "Relaxed Fit Jeans", image: "https://outfitters.com.pk/cdn/shop/files/F0420109630_3.jpg?v=1717046236&width=533", description: "Comfortable jeans balancing comfort and laid-back style for all-day wear.", price: "PKR 1300", sizes: ['S', 'M', 'L'] },
                    { name: "Printed Viscose shirt", image: "https://outfitters.com.pk/cdn/shop/files/F0508103999.jpg?v=1708410062", description: "A lightweight, soft-drape shirt with vibrant patterns for a casual yet stylish look.", price: "PKR 900", sizes: ['S', 'M', 'L', 'XL'] }
                ],
                Women: [
                    { name: "Drip", image: "https://outfitters.com.pk/cdn/shop/files/F0316203901_1.jpg?v=1724150626&width=533", description: "Designed for versatility, transitioning effortlessly from casual wear to chic outings.", price: "PKR 3000", sizes: ['XS', 'M', 'L', 'XL'] },

                    { name: "Shalwar Kameez", image: "https://rabazka.com/cdn/shop/files/MenProduct_0008_DSC09421.jpg?v=1695116075", description: "A traditional comfortable outfit perfect for casual or cultural occasions.", price: "PKR 3000", sizes: ['S', 'M', 'L', 'XL'] }
                ],
                Accessories: [
                    { name: "Antique jewellery", image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYdwzK-JUai-6E_sIqzmYsZoCjOMEt8PHyeg&s", description: "A vintage, timeless piece with intricate detailing, perfect for adding elegance.", price: "PKR 3500", sizes: [] },
                    { name: "Pearl Bangles", image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTajCd2cC4Qc7Y0BU0TrfFdm0FQavHy9poe0A&s", description: "Elegant pearl-adorned bangles adding a timeless and classic touch.", price: "PKR 1500", sizes: [] },
                    { name: "Hoops", image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTC9SrTPaL5uCGa1QZMnW0oPeQrqYFlLtwFXA&s", description: "Stylish hoops that add a bold and elegant statement to any look.", price: "PKR 400", sizes: [] }
                ]
            }
        };

        let cart = [];

        function showCategories(brand) {
            const brandName = document.getElementById('brand-name');
            const subcategories = document.getElementById('subcategories');
            const categoriesDiv = document.getElementById('categories');
            brandName.innerText = brand;
            subcategories.innerHTML = '';
            Object.keys(brandCategories[brand]).forEach(category => {
                const categoryLink = document.createElement('span');
                categoryLink.className = 'subcategory-link';
                categoryLink.innerText = category;
                categoryLink.onclick = () => showProducts(brand, category);
                subcategories.appendChild(categoryLink);
            });
            categoriesDiv.style.display = 'block';
        }

        function showProducts(brand, category) {
            const productGrid = document.getElementById('product-grid');
            productGrid.innerHTML = '';
            brandCategories[brand][category].forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                let sizeDropdownHTML = '';
                if (product.sizes && product.sizes.length > 0) {
                    sizeDropdownHTML = `
                        <label for="size-${product.name}">Select Size:</label>
                        <select id="size-${product.name}" class="size-dropdown">
                            ${product.sizes.map(size => `<option value="${size}">${size}</option>`).join('')}
                        </select>
                    `;
                }
                productCard.innerHTML = `
                    <h4>${product.name}</h4>
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <p>${product.description}</p>
                    <p>Price: ${convertToPKR(product.price)} PKR</p>
                    ${sizeDropdownHTML}
                    <button class="cart-button" onclick="addToCart('${product.name}', '${product.image}', '${convertToPKR(product.price)}')">Add to Cart</button>
                `;
                productGrid.appendChild(productCard);
            });
        }

        function convertToPKR(price) {
            if (!price) return "N/A";
            if (price.includes('PKR')) return parseFloat(price.replace('PKR', '').trim()).toFixed(2);
            if (price.includes('$')) return (parseFloat(price.replace('$', '')) * 280).toFixed(2);
            return "N/A";
        }

        function addToCart(name, image, price) {
            const sizeDropdown = document.getElementById(`size-${name}`);
            const selectedSize = sizeDropdown ? sizeDropdown.value : 'One Size';
            const existingItemIndex = cart.findIndex(item => item.name === name && item.size === selectedSize);
            if (existingItemIndex !== -1) {
                cart[existingItemIndex].quantity += 1;
            } else {
                cart.push({ name, image, price, size: selectedSize, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            alert(`${name} (Size: ${selectedSize}) added to cart!`);
            displayCart();
        }

        function displayCart() {
            const cartItems = document.getElementById('cart-items');
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            cartItems.innerHTML = '';
            if (cart.length === 0) {
                cartItems.innerHTML = '<p>Your cart is empty.</p>';
                return;
            }
            cart.forEach((item, index) => {
                const cartItem = document.createElement('div');
                cartItem.className = 'cart-item';
                cartItem.innerHTML = `
                    <h4>${item.name} (Size: ${item.size})</h4>
                    <img src="${item.image}" alt="${item.name}" width="50">
                    <p>Price: ${item.price} PKR</p>
                    <p>Quantity: ${item.quantity}</p>
                    <button class="remove-button" onclick="removeFromCart(${index})">Remove</button>
                `;
                cartItems.appendChild(cartItem);
            });
            const total = cart.reduce((total, item) => total + parseFloat(item.price) * item.quantity, 0);
            document.getElementById('cart-total').innerText = `Total: PKR ${total.toFixed(2)}`;
        }

        function removeFromCart(index) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
        }

        function checkout() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }
            const totalPayment = cart.reduce((total, item) => total + parseFloat(item.price) * item.quantity, 0);
            localStorage.setItem('totalPayment', totalPayment);
            // CHANGED: url_for('checkout') → checkout.html
            window.location.href = 'checkout.html';
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        // FIXED: Rs{value} → ${value} (was broken template literal syntax)
        function updateBudgetValue(value) {
            document.getElementById('budget-value').textContent = `PKR ${value}`;
        }

        function clearFilters() {
            document.querySelectorAll('.filter-section select, .filter-section input').forEach(input => {
                if (input.type === 'range') {
                    input.value = input.min;
                    updateBudgetValue(input.value);
                } else {
                    input.value = '';
                }
            });
        }

        function applyFilters() {
            alert('Filters applied!');
        }

        displayCart();
    </script>
</body>
</html>
