<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { font-family: Arial, sans-serif; }
        .sidebar { height: 100vh; width: 250px; background: #343a40; color: white; position: fixed; display: flex; flex-direction: column; justify-content: space-between; }
        .sidebar a { display: block; padding: 10px 15px; color: white; text-decoration: none; }
        .sidebar a:hover { background: #495057; text-decoration: none; }
        .main { margin-left: 250px; padding: 20px; }
        .table-wrapper { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div>
            <h3 class="text-center mt-3">Admin Dashboard</h3>
            <a href="#customers">Customers</a>
            <a href="#order-history">Order History</a>
            <a href="#products">All Products</a>
        </div>
        <button onclick="adminLogout()" class="btn btn-danger mt-auto m-3">Logout</button>
    </div>

    <div class="main">
        <h1>Welcome to Admin Dashboard</h1>

        <div id="customers" class="table-wrapper">
            <h2>Customers</h2>
            <table class="table table-striped">
                <thead><tr><th>ID</th><th>Username</th><th>Email</th></tr></thead>
                <tbody id="customers-table-body">
                    <tr><td colspan="3">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="order-history" class="table-wrapper">
            <h2>Order History</h2>
            <table class="table table-striped">
                <thead><tr><th>Order ID</th><th>Customer ID</th><th>Product ID</th><th>Order Date</th></tr></thead>
                <tbody id="orders-table-body">
                    <tr><td colspan="4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // URLs for your Azure Services
        const USER_SERVICE_URL = 'https://fashion-user-service-audqffe9dve4dscm.southeastasia-01.azurewebsites.net';
        const ORDER_SERVICE_URL = 'https://fashion-order-service-gxgugehgfshngyc9.southeastasia-01.azurewebsites.net';

        // Check if admin is logged in
        if (localStorage.getItem('isAdminLoggedIn') !== 'true') {
            window.location.href = 'admin_login.html';
        }

        function adminLogout() {
            localStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'admin_login.html';
        }

        async function fetchCustomers() {
            try {
                // Ensure your User Service app.py has a GET /api/customers endpoint
                const res = await fetch(`${USER_SERVICE_URL}/api/customers`);
                const customers = await res.json();
                const tbody = document.getElementById('customers-table-body');
                tbody.innerHTML = '';
                
                if(customers.length === 0) tbody.innerHTML = '<tr><td colspan="3">No customers found</td></tr>';
                
                customers.forEach(c => {
                    tbody.innerHTML += `<tr><td>${c.customer_id}</td><td>${c.username}</td><td>${c.email}</td></tr>`;
                });
            } catch (err) {
                console.error("Error fetching customers:", err);
                document.getElementById('customers-table-body').innerHTML = '<tr><td colspan="3" class="text-danger">Failed to load</td></tr>';
            }
        }

        async function fetchOrders() {
            try {
                const res = await fetch(`${ORDER_SERVICE_URL}/api/orders`);
                const orders = await res.json();
                const tbody = document.getElementById('orders-table-body');
                tbody.innerHTML = '';
                
                if(orders.length === 0) tbody.innerHTML = '<tr><td colspan="4">No orders found</td></tr>';

                orders.forEach(o => {
                    tbody.innerHTML += `<tr><td>${o.order_id}</td><td>${o.customer_id}</td><td>${o.product_id}</td><td>${new Date(o.order_date).toLocaleString()}</td></tr>`;
                });
            } catch (err) {
                console.error("Error fetching orders:", err);
                document.getElementById('orders-table-body').innerHTML = '<tr><td colspan="4" class="text-danger">Failed to load</td></tr>';
            }
        }

        // Load data when page loads
        window.onload = () => {
            fetchCustomers();
            fetchOrders();
        };
    </script>
</body>
</html>
