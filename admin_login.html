<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Admin Login</title>  
    <style>  
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }  
        .login-container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); width: 300px; }  
        h2 { text-align: center; color: #333; margin-bottom: 20px; }  
        label { display: block; margin-bottom: 5px; color: #333; font-weight: bold; }  
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;}  
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.3s; }  
        button:hover { background-color: #0056b3; }  
        .error { text-align: center; margin-bottom: 10px; color: #d9534f; display: none;}  
    </style>  
</head>  
<body>  
    <div class="login-container">  
        <h2>Admin Login</h2>  
        <div class="error" id="error-msg">Invalid Credentials</div>  
        <form id="admin-login-form">  
            <label for="username">Username:</label>  
            <input type="text" id="username" required>  
            <label for="password">Password:</label>  
            <input type="password" id="password" required>  
            <button type="submit">Login</button>  
        </form>  
    </div>  

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Basic Frontend Admin Check
            if(user === "admin" && pass === "admin123") {
                localStorage.setItem("isAdminLoggedIn", "true");
                window.location.href = "admin.html";
            } else {
                document.getElementById('error-msg').style.display = "block";
            }
        });
    </script>
</body>  
</html>
