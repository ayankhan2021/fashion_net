<!-- category.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover top fashion products in various categories at Fashion.net.">
    <meta property="og:title" content="Fashion.net - Women's Fashion">
    <meta property="og:description" content="Find the best women's fashion at Fashion.net.">
    <meta property="og:image" content="https://example.com/yourimage.jpg">
    <title>Fashion.net - Category</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- CHANGED: /static/styles.css → ./styles.css -->
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

    <!-- FIXED: style block was outside <head> in the original -->
    <style>
        .product-grid { display: flex; justify-content: space-around; flex-wrap: wrap; }
        .product-item { text-align: center; margin: 20px; }
        .product-item img { width: 150px; height: 150px; object-fit: cover; border-radius: 10px; }
    </style>
</head>

<body>
    <header>
        <h1>Fashion.net - Category</h1>
    </header>

    <section id="products">
        <h2>Products for <span id="category-name"></span></h2>
        <div class="product-grid" id="product-grid">
            <!-- Products are dynamically inserted here -->
        </div>
    </section>

    <footer>
        <p>All rights reserved. Fashion.net © 2024</p>
    </footer>

    <script>
        const productCatalog = {
            ethnic: {
                "women's traditional": [
                    { name: "Ethnic Dress 1", image: "images/ethnic_dress1.jpg", price: "$50" },
                    { name: "Ethnic Dress 2", image: "images/ethnic_dress2.jpg", price: "$60" }
                ],
                "men's kurta": [
                    { name: "Men's Kurta 1", image: "images/mens_kurta1.jpg", price: "$40" },
                    { name: "Men's Kurta 2", image: "images/mens_kurta2.jpg", price: "$45" }
                ],
            },
            zellbury: {
                "casual wear": [
                    { name: "Casual Shirt 1", image: "images/zellbury_casual1.jpg", price: "$35" },
                    { name: "Casual Shirt 2", image: "images/zellbury_casual2.jpg", price: "$40" }
                ],
            },
        };

        function capitalizeWords(str) {
            return str.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        const params = new URLSearchParams(window.location.search);
        const brand = params.get('brand');
        const category = params.get('category');

        document.getElementById('category-name').innerText = capitalizeWords(category);

        const products = productCatalog[brand] && productCatalog[brand][category.replace(/-/g, " ")];
        const productGrid = document.getElementById('product-grid');

        if (products) {
            products.forEach(product => {
                const productItem = document.createElement('div');
                productItem.className = 'product-item';
                productItem.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p>Price: ${product.price}</p>
                    <a href="product.html?brand=${brand}&category=${category}&product=${product.name.replace(/\s+/g, '-').toLowerCase()}">View Details</a>
                `;
                productGrid.appendChild(productItem);
            });
        } else {
            productGrid.innerHTML = '<p>No products found for this category.</p>';
        }

        window.showLoginModal = function () {
            if (!localStorage.getItem('modalDismissed')) {
                $('#loginModal').modal('show');
            }
        };
        window.dismissModal = function () {
            $('#loginModal').modal('hide');
            localStorage.setItem('modalDismissed', 'true');
        };

        setInterval(showLoginModal, 120000);
    </script>
</body>
</html>
