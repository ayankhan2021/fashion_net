<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description"
            content="Discover top fashion products in various categories at Fashion.net.">
        <title>Fashion.net - Checkout</title>

        <link rel="stylesheet"
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
        <!-- CHANGED: /static/styles.css → ./styles.css -->
        <link rel="stylesheet" href="/static/styles.css">
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script
            src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

        <style>
        header { background-color: black; color: white; }
        footer { font-size: 12px; justify-content: center; background-color: black; color: white; padding: 10px 0; }
        .navbar-brand { font-size: 20px; text-align: center; }
        .product-item { margin-bottom: 15px; }
        .checkout-form {
            padding: 20px; background-color: #f8f9fa;
            border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .product-details {
            display: flex; justify-content: space-between;
            padding: 10px; border-bottom: 1px solid #ddd;
        }
        .product-details img { width: 50px; height: 50px; border-radius: 5px; margin-right: 10px; }
        .checkout-summary { margin-top: 20px; }
    </style>
    </head>

    <body>
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark">
                <a class="navbar-brand" href="#">Fashion.net</a>
            </nav>
        </header>

        <section id="checkout-section" class="container">
            <h3 class="checkout-heading">Enter Your Details Here for
                Checkout</h3>

            <form class="checkout-form">
                <div class="form-group">
                    <label for="country-region">Country/Region</label>
                    <input type="text" id="country-region" class="form-control"
                        required>
                </div>
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" class="form-control"
                        required>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" class="form-control"
                        required>
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="postal-code">Postal Code</label>
                    <input type="text" id="postal-code" class="form-control"
                        required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" class="form-control" required>
                </div>

                <div>
                    <h4>Payment Option:</h4>
                    <p>Cash on delivery (COD) available only</p>
                </div>

                <h4>Order Summary</h4>
                <div id="order-summary"></div>

                <div class="checkout-summary">
                    <div class="product-details">
                        <span><strong>Subtotal:</strong></span>
                        <span id="subtotal">PKR 0.00</span>
                    </div>
                    <div class="product-details">
                        <span><strong>Shipping:</strong></span>
                        <span id="shipping-cost">PKR 199.00</span>
                    </div>
                    <div class="product-details">
                        <span><strong>Total:</strong></span>
                        <span id="total-price">PKR 0.00</span>
                    </div>
                </div>

                <div class="form-group">
                    <button type="button" id="complete-order-btn"
                        class="btn btn-success"
                        onclick="completeOrder()">Complete Order</button>
                </div>
            </form>
        </section>

        <footer>
            <p class="text-center">All rights reserved. Fashion.net © 2024</p>
        </footer>

        <script>
        function getCart() {
            return JSON.parse(localStorage.getItem('cart')) || [];
        }

        function displayOrderSummary() {
            const cart = getCart();
            const orderSummary = document.getElementById('order-summary');
            let subtotal = 0;
            orderSummary.innerHTML = '';

            cart.forEach(item => {
                const productDiv = document.createElement('div');
                productDiv.className = 'product-details';
                productDiv.innerHTML = `
                    <div>
                        <img src="${item.image}" alt="${item.name}">
                        ${item.name} - ${item.size}
                    </div>
                    <div>${item.price}</div>
                `;
                orderSummary.appendChild(productDiv);
                subtotal += parseFloat(item.price);
            });

            document.getElementById('subtotal').innerText = `PKR ${subtotal.toFixed(2)}`;
            const total = subtotal + 199;
            document.getElementById('total-price').innerText = `PKR ${total.toFixed(2)}`;
        }

        // Add this to your completeOrder function in checkout.html
// checkout.html ke completeOrder() function ko is se replace karein:

async function completeOrder() {
    const isLoggedIn = localStorage.getItem('isLoggedIn');
    const customerId = localStorage.getItem('customer_id');

    // 1. Check if user is logged in
    if (!isLoggedIn || !customerId) {
        alert('You must be logged in to place an order.');
        window.location.href = 'login.html';
        return;
    }

    // 2. Get Cart from LocalStorage
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (cart.length === 0) {
        alert('Your cart is empty.');
        return;
    }

    // 3. Format Data EXACTLY as your app.py expects
    // app.py data.get('cart') expects items with 'product_id' and 'quantity'
    const orderPayload = {
        customer_id: parseInt(customerId),
        cart: cart.map(item => ({
            product_id: parseInt(item.id), // Product ID integer hona chahiye
            quantity: parseInt(item.quantity) || 1
        }))
    };

    try {
        // 4. Send Request to Azure Order Service
        const response = await fetch('https://fashion-order-service-gxgugehgfshngyc9.southeastasia-01.azurewebsites.net/api/orders', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify(orderPayload)
        });

        const result = await response.json();

        if (response.ok && result.success) {
            alert('Order placed successfully! ' + result.message);
            localStorage.removeItem('cart'); // Cart clear karein
            window.location.href = 'index.html'; // Home page par redirect karein
        } else {
            // Agar Product stock mein nahi ya Payment fail ho jaye
            alert(`Order Failed: ${result.error}`);
        }
    } catch (error) {
        console.error("Order Error:", error);
        alert('An error occurred while placing your order. Check console.');
    }
}

        displayOrderSummary();
    </script>
    </body>
</html>
